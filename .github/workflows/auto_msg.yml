name: auto_message

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # UTC 2:00 실행 (KST 기준 11:00)

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Prepare credentials files
      env:
        FS_JSON: ${{ secrets.FS_ACCOUNTS }}   # 식봄 판매자센터 계정/비밀번호 (암호화)
        GS_JSON: ${{ secrets.GS_ACCOUNTS }}   # 구글스프레드시트 계정/비밀번호 (암호화)
      run: |
        printf "$FS_JSON" | base64 -d > fs_accounts.json
        printf "$GS_JSON" | base64 -d > gs_accounts.json

    - name: Run S1_CJFW_GMV.py
      run: python S1_CJFW_GMV.py

    - name: Run S2_Auto_Msg.py
      run: python S2_Auto_Msg.py
